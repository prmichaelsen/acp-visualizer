name = "acp-visualizer"
main = "src/server.ts"
compatibility_date = "2026-03-14"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "viz.agentcontextprotocol.net/*", zone_name = "agentcontextprotocol.net" }
]

[limits]
cpu_ms = 300000

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
